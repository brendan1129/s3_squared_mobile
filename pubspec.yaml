name: s3_squared_mobile
description: "S9 Cloud Storage — mobile frontend"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.12.0

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  http: ^1.2.0
  file_picker: ^8.0.0
  image_picker: ^1.1.0
  url_launcher: ^6.3.0
  flutter_secure_storage: ^9.0.0
  amplify_core: ^2.0.0
  amplify_auth_cognito: ^2.0.0

  # Video playback for .mp4 and .mov preview
  video_player: ^2.9.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true